<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGCINEMA | ACCESS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at top, #0b1f3a, #020617 70%);
            color: #e0f2fe;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .glass {
            background: rgba(10, 25, 50, 0.65);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(56, 189, 248, 0.15);
            box-shadow: 0 0 60px rgba(56,189,248,0.15);
        }

        input:focus, button:focus {
            outline: none !important;
            border-color: #38bdf8 !important;
            background: #0f172a !important;
            box-shadow: 0 0 20px rgba(56,189,248,.6);
            transform: scale(1.03);
            transition: .2s ease-in-out;
        }

        button:focus {
            background: #38bdf8 !important;
            color: #020617 !important;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">

<div class="w-full max-w-sm p-10 glass rounded-[3rem] shadow-2xl">

    <center>
        <h1 class="font-['Orbitron'] text-4xl text-sky-400 mb-2 italic tracking-tighter">
            CF2KGAMER TAMBAYAN PH
        </h1>
        <p class="text-[10px] tracking-[5px] text-sky-900 uppercase mb-10 font-bold">
            Premium Access Portal
        </p>
    </center>

    <div class="space-y-5">

        <div id="status-box" class="hidden p-4 rounded-2xl border text-center">
            <p id="status-text" class="text-[10px] font-black uppercase tracking-widest"></p>
        </div>

        <input type="text" id="u" placeholder="Username"
            class="w-full bg-blue-950/40 p-5 rounded-2xl border border-blue-900 text-sm text-sky-100">

        <input type="password" id="p" placeholder="Password"
            class="w-full bg-blue-950/40 p-5 rounded-2xl border border-blue-900 text-sm text-sky-100">

        <div class="pt-4 space-y-4">

            <button onclick="auth('login')"
                class="w-full bg-sky-400 py-5 rounded-2xl text-blue-950 font-black uppercase text-xs tracking-widest hover:bg-sky-300 transition">
                Login Access
            </button>

            <button onclick="auth('reg')"
                class="w-full bg-blue-950 py-4 rounded-2xl text-sky-200 font-bold text-[10px] uppercase tracking-widest border border-blue-900 hover:bg-blue-900 transition">
                Create Account
            </button>

        </div>
    </div>

    <p class="text-center text-[8px] text-blue-900 mt-8 uppercase tracking-widest">
        Navigate with D-Pad & Enter
    </p>
</div>

<script>
const SB_URL="https://jyhelvryhskzerkkljlw.supabase.co";
const SB_KEY="sb_publishable_or55AZZztXwJ7IZ14NeZeA_jEqz5TxO";
const _sb=supabase.createClient(SB_URL,SB_KEY);

function setStatus(msg,type){
    const box=document.getElementById('status-box');
    const txt=document.getElementById('status-text');
    box.className=`p-4 rounded-2xl border text-center ${type==='error'
        ?'bg-red-500/10 border-red-500/30 text-red-400'
        :'bg-sky-400/10 border-sky-400/30 text-sky-400'}`;
    txt.innerText=msg;
    box.classList.remove('hidden');
}

async function auth(mode){
    const u=document.getElementById('u').value.trim();
    const p=document.getElementById('p').value.trim();

    if(!u||!p) return setStatus("Please fill all fields","error");

    if(mode==='reg'){
        const {error}=await _sb.from('users').insert([{username:u,password:p,status:'pending',is_banned:false}]);
        if(error) return setStatus("Username already taken!","error");
        return setStatus("Account Created! Wait for approval.","success");
    }

    const {data,error}=await _sb.from('users')
        .select('*')
        .eq('username',u)
        .eq('password',p)
        .single();

    if(error||!data) return setStatus("Wrong username or password!","error");

    if(data.status==='pending') return setStatus("Account still PENDING!","error");

    localStorage.setItem('king_session',u);
    window.location.href="home.html";
}

document.addEventListener('keydown',e=>{
    if(e.key==='Enter') auth('login');
});

window.onload=()=>{
    document.getElementById('u').focus();
    if(localStorage.getItem('king_session')) window.location.href="home.html";
};
</script>

</body>
</html>
