<!DOCTYPE html>
<html lang="en">
<head>
<script src="limitdev.js"></script>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>CF2KGAMER TAMBAYAN PH</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
color:white;
font-family:'Plus Jakarta Sans',sans-serif;
background:
radial-gradient(circle at top,#1a5ea5 0%,#0c2448 35%,#020814 100%);
}

.no-scrollbar::-webkit-scrollbar{
display:none;
}

.topbar{
background:rgba(6,24,48,.78);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(120,220,255,.15);
box-shadow:0 8px 25px rgba(0,0,0,.35);
}

.video-container{
position:relative;
width:100%;
aspect-ratio:16/9;
background:#000;
border-bottom:1px solid rgba(90,200,255,.25);
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

iframe{
width:100%;
height:100%;
border:none;
}

/* added only for landscape fallback */
.force-landscape{
position:fixed !important;
top:0;
left:0;
width:100vh !important;
height:100vw !important;
transform:rotate(90deg);
transform-origin:center center;
z-index:99999;
background:#000;
}

.force-landscape iframe{
width:100%;
height:100%;
}

.server-btn{
background:linear-gradient(
135deg,
rgba(12,35,70,.8),
rgba(8,22,42,.95)
);
border:1px solid rgba(120,220,255,.15);
border-radius:14px;
color:#bfefff;
transition:.25s;
font-family:Orbitron;
}

.server-btn.active{
background:linear-gradient(
135deg,
#1d7fff,
#43dfff
);
color:#fff;
box-shadow:0 0 18px rgba(0,200,255,.25);
}

.ep-btn{
background:rgba(10,30,56,.75);
border:1px solid rgba(120,220,255,.12);
border-radius:12px;
transition:.2s;
font-size:11px;
font-weight:800;
color:#8ddfff;
}

.ep-btn.active,
.ep-btn:active{
background:linear-gradient(
135deg,
#1f82ff,
#4fe4ff
);
color:white;
}

.cast-img{
width:62px;
height:62px;
border-radius:50%;
object-fit:cover;
border:2px solid #67d6ff;
box-shadow:0 0 14px rgba(0,200,255,.2);
}

.fs-btn{
background:linear-gradient(
135deg,
#1d7fff,
#47ddff
);
border:none;
color:white;
min-height:44px;
min-width:125px;
}

.panel{
background:linear-gradient(
180deg,
rgba(14,38,70,.58),
rgba(8,18,34,.9)
);
border:1px solid rgba(120,220,255,.12);
backdrop-filter:blur(14px);
border-radius:22px;
}

.section-title{
color:#87eaff;
letter-spacing:3px;
}

select{
background:#0d2444!important;
border:1px solid rgba(120,220,255,.2)!important;
color:#7ee7ff!important;
}

.float-fs{
position:absolute;
top:12px;
right:12px;
z-index:20;
padding:10px 14px;
font-size:12px;
font-weight:900;
border-radius:14px;
border:none;
background:rgba(0,20,40,.65);
color:#8ef5ff;
border:1px solid rgba(130,240,255,.25);
}
</style>
</head>

<body class="pb-10">

<div class="topbar flex items-center gap-4 p-4 sticky top-0 z-50">

<button
onclick="window.location.href='index.html'"
class="text-cyan-300 font-bold text-sm font-['Orbitron']">
← BACK
</button>

<div class="h-4 w-[1px] bg-cyan-900"></div>

<button
onclick="location.reload()"
class="text-cyan-200 text-[10px] font-bold uppercase tracking-widest">
Reload Player
</button>

</div>


<div id="player-area" class="video-container">

<button
class="float-fs"
onclick="goFullScreen(event)">
⛶ Full
</button>

<iframe
id="player-frame"
allowfullscreen
allow="autoplay; fullscreen">
</iframe>

</div>


<main class="p-5">

<div class="panel p-5 mb-6">
<h2 id="title"
class="text-2xl font-black uppercase italic">
Loading...
</h2>

<div class="flex gap-3 mt-2 mb-2">
<span id="rating">★ --</span>

<span id="type-tag"
class="bg-cyan-950 px-2 py-1 rounded text-[9px]">
Movie
</span>
</div>
</div>


<div class="panel p-5 mb-6">

<p class="section-title text-[9px] mb-3">
SELECT SERVER
</p>

<div class="grid grid-cols-3 gap-3">
<button onclick="updateServer('server1')" id="btn-server1" class="server-btn py-3 active">Server 1</button>
<button onclick="updateServer('server2')" id="btn-server2" class="server-btn py-3">Server 2</button>
<button onclick="updateServer('server3')" id="btn-server3" class="server-btn py-3">Server 3</button>
<button onclick="updateServer('server4')" id="btn-server4" class="server-btn py-3">Server 4</button>
<button onclick="updateServer('server5')" id="btn-server5" class="server-btn py-3">Server 5</button>
<button onclick="updateServer('server6')" id="btn-server6" class="server-btn py-3">Server 6</button>
</div>

</div>


<div id="series-controls"
class="hidden panel p-5 mb-6">

<p class="section-title text-[9px] mb-3">
EPISODES
</p>

<select id="seasonSelect"
onchange="loadEpisodes(this.value)"
class="w-full p-3 rounded-xl mb-4">
</select>

<div id="episode-list"
class="grid grid-cols-4 gap-2 max-h-40 overflow-y-auto no-scrollbar">
</div>

</div>


<div class="panel p-5 mb-6">
<p class="section-title text-[9px] mb-3">
OVERVIEW
</p>
<p id="overview"></p>
</div>


<div class="panel p-5">
<p class="section-title text-[9px] mb-4">
TOP CAST
</p>
<div id="cast-list"
class="flex gap-4 overflow-x-auto no-scrollbar">
</div>
</div>

</main>


<script>
const apiKey=
"024c5dee9af18585c60e92fa104e3f8c";

const urlParams=
new URLSearchParams(
window.location.search
);

const id=urlParams.get("id");
const type=urlParams.get("type")||"movie";

let currentSeason=1;
let currentEpisode=1;
let currentServer="server1";


/* only fullscreen modified */
async function goFullScreen(e){

if(e){
e.preventDefault();
e.stopPropagation();
}

const iframe=
document.getElementById(
"player-frame"
);

const playerArea=
document.getElementById(
"player-area"
);

try{

if(iframe.requestFullscreen){
await iframe.requestFullscreen();
}
else if(
iframe.webkitRequestFullscreen
){
iframe.webkitRequestFullscreen();
}
else if(
iframe.msRequestFullscreen
){
iframe.msRequestFullscreen();
}
else if(
playerArea.requestFullscreen
){
await playerArea.requestFullscreen();
}
else if(
playerArea.webkitRequestFullscreen
){
playerArea.webkitRequestFullscreen();
}

let locked=false;

if(
screen.orientation &&
screen.orientation.lock
){
try{
await screen.orientation.lock(
"landscape"
);
locked=true;
}catch(err){}
}

/* fallback rotate */
if(!locked){
playerArea.classList.add(
"force-landscape"
);
}

}catch(err){
console.log(err);
}

}


/* remove rotate on exit */
document.addEventListener(
"fullscreenchange",
function(){

if(
!document.fullscreenElement
){

document
.getElementById(
"player-area"
)
.classList.remove(
"force-landscape"
);

if(
screen.orientation &&
screen.orientation.unlock
){
try{
screen.orientation.unlock();
}catch(e){}
}

}

}
);



function updateServer(serverKey){

currentServer=serverKey;

const playerFrame=
document.getElementById(
"player-frame"
);

const mediaType=
type==="anime"
?"tv":type;

document
.querySelectorAll(".server-btn")
.forEach(btn=>
btn.classList.remove("active")
);

document
.getElementById(
"btn-"+serverKey
).classList.add(
"active"
);

const servers={

server1:
`https://vidlink.pro/${mediaType}/${id}${mediaType==="tv"?`/${currentSeason}/${currentEpisode}`:""}?autoplay=true`,

server2:
`https://embed.su/embed/${mediaType}/${id}${mediaType==="tv"?`/${currentSeason}/${currentEpisode}`:""}?autoplay=1`,

server3:
`https://player.autoembed.cc/embed/${mediaType}/${id}${mediaType==="tv"?`/${currentSeason}/${currentEpisode}`:""}?autoplay=1`,

server4:
`https://vidsrc.cc/v2/embed/${mediaType}/${id}${mediaType==="tv"?`/${currentSeason}/${currentEpisode}`:""}?autoplay=1`,

server5:
mediaType==="tv"
?`https://www.2embed.cc/embedtv/${id}&s=${currentSeason}&e=${currentEpisode}`
:`https://www.2embed.cc/embed/${id}`,

server6:
`https://multiembed.mov/?video_id=${id}&tmdb=1${mediaType==="tv"?`&s=${currentSeason}&e=${currentEpisode}`:""}`
};

playerFrame.src=
servers[serverKey];

}


async function init(){

if(!id)return;

const mediaType=
type==="anime"
?"tv":type;

try{

const response=
await fetch(
`https://api.themoviedb.org/3/${mediaType}/${id}?api_key=${apiKey}`
);

const data=
await response.json();

title.textContent=
data.title||data.name;

overview.textContent=
data.overview;

rating.textContent=
"★ "+
(
data.vote_average?
data.vote_average.toFixed(1):
"0.0"
);

type-tag.textContent=type;


const creditsResponse=
await fetch(
`https://api.themoviedb.org/3/${mediaType}/${id}/credits?api_key=${apiKey}`
);

const creditsData=
await creditsResponse.json();

cast-list.innerHTML=
creditsData.cast.slice(0,10)
.map(person=>`
<div class="flex-shrink-0 text-center w-16">
<img class="cast-img mb-2"
src="${person.profile_path?
'https://image.tmdb.org/t/p/w185'+person.profile_path:
'https://via.placeholder.com/60'}">
<p class="text-[8px] font-bold truncate text-cyan-300 uppercase">
${person.name}
</p>
</div>
`).join("");

if(mediaType==="tv"){

document.getElementById(
"series-controls"
).classList.remove("hidden");

seasonSelect.innerHTML=
data.seasons
.filter(s=>s.season_number>0)
.map(s=>`
<option value="${s.season_number}">
Season ${s.season_number}
</option>
`).join("");

loadEpisodes(1);

}else{
updateServer("server1");
}

}catch(e){
console.log(e);
}

}


async function loadEpisodes(seasonNum){

currentSeason=seasonNum;

const response=
await fetch(
`https://api.themoviedb.org/3/tv/${id}/season/${seasonNum}?api_key=${apiKey}`
);

const data=
await response.json();

episode-list.innerHTML=
data.episodes.map(ep=>`
<button
onclick="setEpisode(${ep.episode_number})"
class="ep-btn py-3">
EP ${ep.episode_number}
</button>
`).join("");

setEpisode(1);

}

function setEpisode(epNum){
currentEpisode=epNum;
updateServer(currentServer);
}

init();
</script>

</body>
</html>
