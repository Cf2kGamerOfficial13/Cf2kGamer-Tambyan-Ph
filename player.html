<!DOCTYPE html>
<html lang="en">
<head>
<script src="limitdev.js"></script>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>CF2KGAMER TAMBAYAN PH</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
color:white;
font-family:'Plus Jakarta Sans',sans-serif;
background:
radial-gradient(circle at top,#1a5ea5 0%,#0c2448 35%,#020814 100%);
}

.no-scrollbar::-webkit-scrollbar{
display:none;
}

.topbar{
background:rgba(6,24,48,.78);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(120,220,255,.15);
box-shadow:0 8px 25px rgba(0,0,0,.35);
}

.video-container{
position:relative;
width:100%;
aspect-ratio:16/9;
background:#000;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

.force-landscape{
position:fixed !important;
top:0;
left:0;
width:100vh !important;
height:100vw !important;
transform:rotate(90deg);
transform-origin:center center;
z-index:99999;
background:#000;
}

.force-landscape iframe{
width:100%;
height:100%;
}

.server-btn{
background:linear-gradient(
135deg,
rgba(12,35,70,.8),
rgba(8,22,42,.95)
);
border:1px solid rgba(120,220,255,.15);
border-radius:14px;
color:#bfefff;
font-family:Orbitron;
}

.server-btn.active{
background:linear-gradient(
135deg,#1d7fff,#43dfff
);
color:#fff;
}

.ep-btn{
background:#0d2444;
border:1px solid rgba(120,220,255,.12);
border-radius:12px;
font-size:11px;
font-weight:800;
color:#8ddfff;
}

.ep-btn:active{
background:#1f82ff;
color:#fff;
}

.panel{
background:linear-gradient(
180deg,
rgba(14,38,70,.58),
rgba(8,18,34,.9)
);
border:1px solid rgba(120,220,255,.12);
border-radius:22px;
backdrop-filter:blur(14px);
}

.section-title{
color:#87eaff;
letter-spacing:3px;
}

.cast-img{
width:62px;
height:62px;
border-radius:50%;
object-fit:cover;
border:2px solid #67d6ff;
}

.float-fs{
position:absolute;
top:12px;
right:12px;
z-index:50;
padding:10px 14px;
font-size:12px;
font-weight:900;
border-radius:14px;
border:none;
background:rgba(0,20,40,.65);
color:#8ef5ff;
border:1px solid rgba(130,240,255,.25);
}
</style>
</head>

<body class="pb-10">

<div class="topbar flex items-center gap-4 p-4 sticky top-0 z-50">

<button
onclick="history.back()"
class="text-cyan-300 font-bold text-sm font-['Orbitron']">
← BACK
</button>

<div class="h-4 w-[1px] bg-cyan-900"></div>

<button
onclick="location.reload()"
class="text-cyan-200 text-[10px] font-bold uppercase">
Reload Player
</button>

</div>


<div id="player-area" class="video-container">

<button
class="float-fs"
onclick="goFullScreen(event)">
⛶ Full
</button>

<iframe
id="player-frame"
allowfullscreen
allow="autoplay; fullscreen">
</iframe>

</div>


<main class="p-5">

<div class="panel p-5 mb-6">

<h2 id="title"
class="text-2xl font-black italic">
Loading...
</h2>

<div class="flex gap-3 mt-2">
<span id="rating">
★ --
</span>

<span id="type-tag"
class="bg-cyan-950 px-2 py-1 rounded text-[9px]">
Movie
</span>
</div>

</div>


<div class="panel p-5 mb-6">

<p class="section-title text-[9px] mb-3">
SELECT SERVER
</p>

<div class="grid grid-cols-3 gap-3">

<button onclick="updateServer('server1')" id="btn-server1" class="server-btn py-3 active">Server1</button>
<button onclick="updateServer('server2')" id="btn-server2" class="server-btn py-3">Server2</button>
<button onclick="updateServer('server3')" id="btn-server3" class="server-btn py-3">Server3</button>
<button onclick="updateServer('server4')" id="btn-server4" class="server-btn py-3">Server4</button>
<button onclick="updateServer('server5')" id="btn-server5" class="server-btn py-3">Server5</button>
<button onclick="updateServer('server6')" id="btn-server6" class="server-btn py-3">Server6</button>

</div>
</div>


<div id="series-controls"
class="hidden panel p-5 mb-6">

<p class="section-title text-[9px] mb-3">
EPISODES
</p>

<select
id="seasonSelect"
onchange="loadEpisodes(this.value)"
class="w-full p-3 rounded-xl mb-4">
</select>

<div id="episode-list"
class="grid grid-cols-4 gap-2">
</div>

</div>


<div class="panel p-5 mb-6">
<p class="section-title text-[9px] mb-3">
OVERVIEW
</p>
<p id="overview"></p>
</div>


<div class="panel p-5">
<p class="section-title text-[9px] mb-4">
TOP CAST
</p>

<div id="cast-list"
class="flex gap-4 overflow-x-auto no-scrollbar">
</div>
</div>

</main>



<script>
const apiKey="024c5dee9af18585c60e92fa104e3f8c";

const urlParams=
new URLSearchParams(
window.location.search
);

const id=urlParams.get("id");
const type=urlParams.get("type")||"movie";

let currentSeason=1;
let currentEpisode=1;
let currentServer="server1";



async function goFullScreen(e){

if(e){
e.preventDefault();
e.stopPropagation();
}

const player=
document.getElementById(
"player-area"
);

try{

if(player.requestFullscreen){
await player.requestFullscreen();
}
else if(player.webkitRequestFullscreen){
player.webkitRequestFullscreen();
}

let locked=false;

if(
screen.orientation &&
screen.orientation.lock
){
try{
await screen.orientation.lock(
"landscape"
);
locked=true;
}catch(err){}
}

/* fallback force landscape */
if(!locked){
player.classList.add(
"force-landscape"
);
}

window.scrollTo(0,1);

}catch(err){
console.log(err);
}

}



/* remove rotate on exit */
document.addEventListener(
"fullscreenchange",
function(){

if(
!document.fullscreenElement
){

document
.getElementById(
"player-area"
)
.classList.remove(
"force-landscape"
);

if(
screen.orientation &&
screen.orientation.unlock
){
try{
screen.orientation.unlock();
}catch(e){}
}

}

}
);



function updateServer(serverKey){

currentServer=serverKey;

document
.querySelectorAll(".server-btn")
.forEach(
b=>b.classList.remove("active")
);

document
.getElementById(
"btn-"+serverKey
).classList.add("active");


const mediaType=
type==="anime"
?"tv":type;


const servers={

server1:
`https://vidlink.pro/${mediaType}/${id}${mediaType==="tv"?`/${currentSeason}/${currentEpisode}`:""}?autoplay=true`,

server2:
`https://embed.su/embed/${mediaType}/${id}${mediaType==="tv"?`/${currentSeason}/${currentEpisode}`:""}?autoplay=1`,

server3:
`https://player.autoembed.cc/embed/${mediaType}/${id}${mediaType==="tv"?`/${currentSeason}/${currentEpisode}`:""}?autoplay=1`,

server4:
`https://vidsrc.cc/v2/embed/${mediaType}/${id}${mediaType==="tv"?`/${currentSeason}/${currentEpisode}`:""}?autoplay=1`,

server5:
mediaType==="tv"
?`https://www.2embed.cc/embedtv/${id}&s=${currentSeason}&e=${currentEpisode}`
:`https://www.2embed.cc/embed/${id}`,

server6:
`https://multiembed.mov/?video_id=${id}&tmdb=1${mediaType==="tv"?`&s=${currentSeason}&e=${currentEpisode}`:""}`
};

document
.getElementById(
"player-frame"
).src=
servers[serverKey];

}



async function init(){

if(!id)return;

const mediaType=
type==="anime"
?"tv":type;

const r=
await fetch(
`https://api.themoviedb.org/3/${mediaType}/${id}?api_key=${apiKey}`
);

const data=
await r.json();

title.textContent=
data.title||data.name;

overview.textContent=
data.overview;

rating.textContent=
"★ "+(
data.vote_average?
data.vote_average.toFixed(1):
"0.0"
);

type-tag.textContent=type;

updateServer("server1");


if(mediaType==="tv"){

document
.getElementById(
"series-controls"
)
.classList.remove(
"hidden"
);

seasonSelect.innerHTML=
data.seasons
.filter(
s=>s.season_number>0
)
.map(
s=>`
<option value="${s.season_number}">
Season ${s.season_number}
</option>
`
).join("");

loadEpisodes(1);

}

}



async function loadEpisodes(seasonNum){

currentSeason=seasonNum;

const r=
await fetch(
`https://api.themoviedb.org/3/tv/${id}/season/${seasonNum}?api_key=${apiKey}`
);

const data=
await r.json();

episode-list.innerHTML=
data.episodes.map(ep=>`
<button
onclick="setEpisode(${ep.episode_number})"
class="ep-btn py-3">
EP ${ep.episode_number}
</button>
`).join("");

setEpisode(1);

}



function setEpisode(ep){
currentEpisode=ep;
updateServer(currentServer);
}

init();

</script>

</body>
  </html>
