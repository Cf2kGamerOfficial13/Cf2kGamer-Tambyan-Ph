<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>CF2KGAMER TAMBAYAN PH</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.3/shaka-player.compiled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
background:#020814;
font-family:Arial;
color:white;
}

#video{
width:100%;
height:45vh;
background:black;
}

#status-msg{
position:fixed;
top:15px;
left:15px;
padding:10px 16px;
background:#0b2447;
border-radius:12px;
z-index:99;
display:none;
}

#channel-list-container{
padding:15px;
display:grid;
gap:12px;
}

.channel-item{
display:flex;
align-items:center;
gap:15px;
padding:12px;
border-radius:14px;
background:#102c52;
cursor:pointer;
}

.channel-item.active{
background:#35b8ff;
color:#00111d;
}

.ch-logo{
width:70px;
height:45px;
object-fit:contain;
background:#000;
border-radius:8px;
}
</style>
</head>
<body>

<div id="status-msg">
LOADING...
</div>

<video
id="video"
controls
autoplay
playsinline>
</video>

<div id="channel-list-container"></div>

<script>
let channels=[];

const CHANNELS_URL=
"https://raw.githubusercontent.com/Cf2kGamerOfficial13/Cf2kGamer-Tambyan-Ph/main/channels.json";

const videoElement=
document.getElementById(
"video"
);

const statusMsg=
document.getElementById(
"status-msg"
);

let hlsPlayer=null;
let shakaPlayer=null;


/* inline proxy fallback */
function proxify(url){

if(
url.includes(".mpd") ||
url.includes(".m3u8")
){

return(
"https://api.allorigins.win/raw?url="+
encodeURIComponent(url)
);

}

return url;

}



async function loadChannels(){

try{

statusMsg.style.display="block";
statusMsg.innerText=
"LOADING CHANNELS...";

const res=
await fetch(
CHANNELS_URL+
"?v="+Date.now(),
{
cache:"no-store"
}
);

channels=
await res.json();

renderChannels();

statusMsg.style.display="none";

setTimeout(function(){

let first=
document.querySelector(
".channel-item"
);

if(first){
first.click();
}

},700);

}catch(e){

console.log(e);

statusMsg.innerText=
"CHANNEL LOAD FAILED";

}

}



async function initApp(){

shaka.polyfill.installAll();

shakaPlayer=
new shaka.Player(
videoElement
);

shakaPlayer.addEventListener(
"error",
function(){
statusMsg.style.display=
"block";

statusMsg.innerText=
"STREAM ERROR";
}
);

await loadChannels();

}



async function switchChannel(
ch,
element
){

document
.querySelectorAll(
".channel-item"
)
.forEach(function(el){
el.classList.remove(
"active"
);
});

element.classList.add(
"active"
);

statusMsg.style.display=
"block";

statusMsg.innerText=
"CONNECTING...";


if(hlsPlayer){
hlsPlayer.destroy();
hlsPlayer=null;
}

await shakaPlayer.unload();

let url=
proxify(
ch.file
);


try{

if(
ch.type==="dash" ||
url.includes(".mpd")
){

if(
ch.drm &&
ch.drm.clearkey
){

shakaPlayer.configure({
drm:{
clearKeys:{
[ch.drm.clearkey.keyId]:
ch.drm.clearkey.key
}
}
});

}

await shakaPlayer.load(
url
);

}
else{

if(
Hls.isSupported()
){

hlsPlayer=
new Hls();

hlsPlayer.loadSource(
url
);

hlsPlayer.attachMedia(
videoElement
);

}else{

videoElement.src=url;

}

}

videoElement.play();

setTimeout(function(){

statusMsg.style.display=
"none";

},1500);

}
catch(e){

console.log(e);

if(
ch.file.includes(".mpd")
){

try{

/* second fallback direct */
await shakaPlayer.load(
ch.file
);

videoElement.play();

statusMsg.style.display=
"none";

return;

}catch(x){}

}

statusMsg.style.display=
"block";

statusMsg.innerText=
"CHANNEL OFFLINE";

}

}



function renderChannels(){

let container=
document.getElementById(
"channel-list-container"
);

container.innerHTML="";

channels.forEach(function(ch){

let item=
document.createElement(
"div"
);

item.className=
"channel-item";

item.innerHTML=`
<img class="ch-logo"
src="${ch.image||''}">

<div>
<b>${ch.title}</b><br>
<small>● LIVE</small>
</div>
`;

item.onclick=function(){

switchChannel(
ch,
item
);

};

container.appendChild(
item
);

});

}



document.addEventListener(
"DOMContentLoaded",
initApp
);
</script>

</body>
</html>
