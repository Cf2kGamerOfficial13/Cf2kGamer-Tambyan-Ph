<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>CF2KGAMER TAMBAYAN PH | PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.3/shaka-player.compiled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root{
--primary:#66c8ff;
--accent:#9df4ff;
--bg1:#020814;
--bg2:#081d38;
--glass:rgba(11,33,60,.68);
--border:rgba(125,220,255,.22);
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
height:100%;
overflow:hidden;
font-family:Inter,sans-serif;
color:#fff;
background:radial-gradient(circle at top,#1a5ea5 0%,#0b2447 38%,#020814 100%);
}

.wrapper{
height:100%;
display:flex;
flex-direction:column;
}

.nav-bar{
height:70px;
padding:0 18px;
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
background:rgba(5,22,46,.72);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(120,210,255,.25);
}

.brand-wrap{
justify-self:center;
text-align:center;
}

.brand-title{
font-family:Orbitron;
font-size:15px;
font-weight:800;
color:#c9f6ff;
}

#total-channels{
font-size:9px;
margin-top:4px;
font-family:Orbitron;
color:#88dfff;
}

#now-playing{
justify-self:end;
width:110px;
text-align:right;
font-size:10px;
font-family:Orbitron;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.main-layout{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

.video-box{
position:relative;
width:100%;
aspect-ratio:16/9;
background:#000;
overflow:hidden;
}

#video{
width:100%;
height:100%;
background:#000;
}

#status-msg{
position:absolute;
top:15px;
left:15px;
display:none;
padding:10px 16px;
border-radius:14px;
background:rgba(8,35,70,.85);
font-size:11px;
font-family:Orbitron;
z-index:3;
}

.custom-controls{
position:absolute;
bottom:0;
left:0;
width:100%;
padding:12px;
background:linear-gradient(to top, rgba(0,0,0,.85), transparent);
display:flex;
align-items:center;
gap:10px;
opacity:0;
transition:.3s;
z-index:2;
}

.video-box:hover .custom-controls{
opacity:1;
}

.ctrl-btn{
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.2);
padding:8px 10px;
border-radius:10px;
font-size:12px;
cursor:pointer;
color:#fff;
}

.progress{
flex:1;
height:6px;
background:rgba(255,255,255,.2);
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.progress-bar{
height:100%;
width:0%;
background:#66c8ff;
}

.time{
font-size:10px;
font-family:Orbitron;
}

.side-gesture{
position:absolute;
top:0;
width:50%;
height:100%;
z-index:1;
}

#left-gesture{left:0;}
#right-gesture{right:0;}

.overlay-indicator{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.6);
padding:10px 16px;
border-radius:12px;
font-family:Orbitron;
font-size:12px;
display:none;
z-index:4;
}

.sidebar{
flex:1;
display:flex;
flex-direction:column;
background:linear-gradient(180deg,rgba(7,28,52,.92),rgba(3,15,30,.97));
overflow:hidden;
}

.search-area{
padding:14px;
border-bottom:1px solid var(--border);
}

#channel-search{
width:100%;
padding:14px 15px;
border-radius:16px;
border:1px solid rgba(110,200,255,.22);
background:rgba(15,45,78,.6);
color:#fff;
outline:none;
}

.scroll-list{
flex:1;
overflow-y:auto;
padding:14px;
display:grid;
gap:13px;
}

.channel-item{
display:flex;
align-items:center;
gap:12px;
padding:12px;
border-radius:18px;
background:rgba(11,33,60,.68);
border:1px solid rgba(125,220,255,.22);
cursor:pointer;
transition:.25s;
}

.channel-item:hover,
.channel-item.active{
transform:translateY(-2px);
background:linear-gradient(135deg,rgba(36,125,255,.9),rgba(0,215,255,.8));
}

.channel-item.active .ch-title{
color:#001426;
}

.ch-logo{
width:68px;
height:44px;
border-radius:12px;
object-fit:contain;
background:#03111f;
}

.ch-title{
font-size:13px;
font-weight:700;
}

.ch-status{
font-size:10px;
margin-top:3px;
font-family:Orbitron;
color:#7fe3ff;
}

@media (orientation:landscape){
.main-layout{flex-direction:row;height:calc(100vh - 70px);}
.video-box{flex:2.3;height:100%;aspect-ratio:auto;}
.sidebar{flex:1;max-width:430px;}
}
</style>
</head>

<body>

<div class="wrapper">

<header class="nav-bar">
<div></div>

<div class="brand-wrap">
<h1 class="brand-title">CF2KGAMER TAMBAYAN PH</h1>
<div id="total-channels">0 CHANNELS</div>
</div>

<div id="now-playing">LIVE</div>
</header>

<main class="main-layout">

<section class="video-box" id="video-container">

<div id="status-msg">LOADING...</div>

<div class="overlay-indicator" id="indicator"></div>

<div id="left-gesture" class="side-gesture"></div>
<div id="right-gesture" class="side-gesture"></div>

<video id="video" playsinline></video>

<div class="custom-controls">

<button class="ctrl-btn" onclick="togglePlay()">▶</button>

<div class="progress" onclick="seek(event)">
<div class="progress-bar" id="progress-bar"></div>
</div>

<div class="time" id="time-display">0:00</div>

<button class="ctrl-btn" onclick="toggleMute()">🔊</button>

<button class="ctrl-btn" onclick="toggleFullscreen()">⛶</button>

</div>

</section>

<aside class="sidebar">

<div class="search-area">
<input type="text" id="channel-search" placeholder="Search channels..." onkeyup="filterChannels()">
</div>

<div class="scroll-list" id="channel-list-container"></div>

</aside>

</main>
</div>

<script>
let channels = [];

const videoElement = document.getElementById("video");
const statusMsg = document.getElementById("status-msg");
const indicator = document.getElementById("indicator");

let hlsPlayer = null;
let shakaPlayer = null;

const CHANNELS_URL = "https://raw.githubusercontent.com/Cf2kGamerOfficial13/Cf2kGamer-Tambyan-Ph/main/channels.json";

async function loadChannels(){
try{
statusMsg.style.display="block";
statusMsg.innerText="LOADING CHANNELS...";

const res = await fetch(CHANNELS_URL + "?v=" + Date.now(), { cache:"no-store" });

if(!res.ok) throw "error";

channels = await res.json();
if(!Array.isArray(channels) || !channels.length) throw "empty";

document.getElementById("total-channels").innerText = channels.length + " CHANNELS";

statusMsg.style.display="none";
return true;

}catch(e){
statusMsg.style.display="block";
statusMsg.innerText="CHANNEL LOAD FAILED";
return false;
}
}

async function initApp(){

shaka.polyfill.installAll();
shakaPlayer = new shaka.Player(videoElement);

shakaPlayer.addEventListener("error", () => {
statusMsg.style.display="block";
statusMsg.innerText="STREAM ERROR";
});

let loaded = await loadChannels();

if(loaded){
renderChannels();
if(channels.length){
setTimeout(()=>{
const first = document.querySelector(".channel-item");
if(first) first.click();
},800);
}
}
}

async function switchChannel(ch, element){

document.querySelectorAll(".channel-item")
.forEach(el => el.classList.remove("active"));

element.classList.add("active");

document.getElementById("now-playing").innerText = ch.title;

statusMsg.style.display="block";
statusMsg.innerText="CONNECTING...";

if(hlsPlayer){
hlsPlayer.destroy();
hlsPlayer = null;
}
await shakaPlayer.unload();

let url = ch.file;

try{

if(url.includes(".mpd")){

if(ch.drm && ch.drm.clearkey){
shakaPlayer.configure({
drm:{
clearKeys:{
[ch.drm.clearkey.keyId]: ch.drm.clearkey.key
}
}
});
}

await shakaPlayer.load(url);

}else{

if(Hls.isSupported()){
hlsPlayer = new Hls();
hlsPlayer.loadSource(url);
hlsPlayer.attachMedia(videoElement);
}else{
videoElement.src = url;
}

}

videoElement.play();

setTimeout(()=>{
statusMsg.style.display="none";
},1200);

}catch(e){
statusMsg.style.display="block";
statusMsg.innerText="CHANNEL OFFLINE";
}
}

function renderChannels(){

const container = document.getElementById("channel-list-container");
container.innerHTML = "";

channels.forEach((ch)=>{

const item = document.createElement("div");
item.className = "channel-item";

item.innerHTML = `
<img class="ch-logo"
src="${ch.image || ''}"
onerror="this.src='https://via.placeholder.com/70x50/111/66c8ff?text=TV'">

<div>
<div class="ch-title">${ch.title}</div>
<div class="ch-status">● ONLINE</div>
</div>
`;

item.onclick = () => switchChannel(ch, item);

container.appendChild(item);

});
}

function filterChannels(){

let val = document.getElementById("channel-search").value.toLowerCase();

document.querySelectorAll(".channel-item").forEach(item => {

let t = item.querySelector(".ch-title").textContent.toLowerCase();

item.style.display = t.includes(val) ? "flex" : "none";

});
}

function togglePlay(){
if(videoElement.paused){
videoElement.play();
}else{
videoElement.pause();
}
}

function toggleMute(){
videoElement.muted = !videoElement.muted;
}

function toggleFullscreen(){
const container = document.getElementById("video-container");

if(!document.fullscreenElement){
container.requestFullscreen();
if(screen.orientation && screen.orientation.lock){
screen.orientation.lock("landscape").catch(()=>{});
}
}else{
document.exitFullscreen();
if(screen.orientation && screen.orientation.unlock){
screen.orientation.unlock();
}
}
}

const progressBar = document.getElementById("progress-bar");
const timeDisplay = document.getElementById("time-display");

videoElement.addEventListener("timeupdate", ()=>{
const percent = (videoElement.currentTime / videoElement.duration) * 100;
progressBar.style.width = percent + "%";

let min = Math.floor(videoElement.currentTime / 60);
let sec = Math.floor(videoElement.currentTime % 60);
if(sec < 10) sec = "0" + sec;

timeDisplay.innerText = min + ":" + sec;
});

function seek(e){
const rect = e.currentTarget.getBoundingClientRect();
const percent = (e.clientX - rect.left) / rect.width;
videoElement.currentTime = percent * videoElement.duration;
}

let brightness = 1;
let volume = 1;

function showIndicator(text){
indicator.innerText = text;
indicator.style.display="block";
clearTimeout(indicator.hide);
indicator.hide = setTimeout(()=>indicator.style.display="none",800);
}

let startY = 0;

document.getElementById("left-gesture").addEventListener("touchstart", e=>{
startY = e.touches[0].clientY;
});

document.getElementById("left-gesture").addEventListener("touchmove", e=>{
let diff = startY - e.touches[0].clientY;
brightness += diff * 0.005;
if(brightness > 2) brightness = 2;
if(brightness < 0.3) brightness = 0.3;
videoElement.style.filter = `brightness(${brightness})`;
showIndicator("BRIGHTNESS " + Math.round(brightness*100) + "%");
startY = e.touches[0].clientY;
});

document.getElementById("right-gesture").addEventListener("touchstart", e=>{
startY = e.touches[0].clientY;
});

document.getElementById("right-gesture").addEventListener("touchmove", e=>{
let diff = startY - e.touches[0].clientY;
volume += diff * 0.005;
if(volume > 1) volume = 1;
if(volume < 0) volume = 0;
videoElement.volume = volume;
showIndicator("VOLUME " + Math.round(volume*100) + "%");
startY = e.touches[0].clientY;
});

document.addEventListener("DOMContentLoaded", initApp);
</script>

</body>
</html>
